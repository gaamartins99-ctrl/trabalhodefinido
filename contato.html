<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Guia Muriaé</title>
    <link rel="shortcut icon" href="img/iconemuriae.png" type="icone">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Contato</h1>
        <p>Envie sua mensagem ou sugestão de local</p>
    </header>

    <nav>
        <a href="index.html">Início</a>
        <a href="pontos turiscos.html">Pontos Turísticos</a>
        <a href="gastronomia.html">Gastronomia</a>
        <a href="contato.html">Contato / Sugestões</a>
    </nav>

    <main>
        <section class="formulario-secao">
            <h2>Formulário de Contato</h2>
            
            <form action="#" method="POST">
                <div class="campo">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
                </div>

                <div class="campo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>

                <div class="campo">
                    <label for="motivo">Motivo do Contato:</label>
                    <select id="motivo" name="motivo">
                        <option value="sugestao">Sugerir Ponto Turístico</option>
                        <option value="duvida">Dúvidas</option>
                        <option value="erro">Reportar Erro no Site</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="mensagem">Sua Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva aqui..."></textarea>
                </div>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Guia Turístico de Muriaé - Trabalho Prático Web I</p>
    </footer>

</body>
</html>
